<!DOCTYPE html>
<html>
<style>svg {transform: scaleX(-1);}</style>
<body>

<button onclick="getLocation()">load map</button>

<p id="map"></p>

<script>
const x = document.getElementById("map");

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(showPosition);
  } else { 
    x.innerHTML = "Geolocation is not supported by this browser.";
  }
}
    
function showPosition(position) {
  x.innerHTML = '<?xml version="1.0" encoding="utf-8"?>  <svg viewBox="-14.5 506 4 3" width="800" height="400" xmlns="http://www.w3.org/2000/svg"><rect style="fill:blue;"x="-16" y="505" width="100" height="100"/><path style="fill: green; stroke: #c2b280; stroke-width: .1;" transform=" rotate(180 -12.90673896530209 507.0147018447828)" d="M -13.1253539235475 507.675042459578 L -12.9067389653021 507.014701844783 L -12.7524302351478 507.660936197748 L -10.6965630207881 506.865913804346 L -11.8249506967648 506.036189843283 L -13.0201734026282 505.777015359608 L -15.8169986089393 506.626320315461 Z"/><circle style="fill: red; stroke: none;" transform="rotate(180 -12.90673896530209 507.0147018447828)" cx="'
  + position.coords.longitude*10 + '" cy="' + position.coords.latitude*10 + 
  '" r=".05"/></svg><br>speed:' + position.coords.speed*0.447;
}
</script>

</body>
</html>
