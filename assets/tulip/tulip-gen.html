<!DOCTYPE html><html lang="en"><head>
      <title>tulip generator</title>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description" content="Website for the Isle of Wight Triumph Sport Six Club, tool to generate a simple tulip diagram for a single junction.">
      <link rel="stylesheet" href="style.css">
      <link rel="canonical" href="https://iow.triumphsportsix.club/tulip-gen" />
</head>
<script src="tulip-gen.js">
</script>
<body>
<h1>Tulip Diagram Generator</h1>
For a full Road map generator go <a target="_blank" href="index.html">here</a>
This tool generates a simple tulip diagram for a single junction.<br> For a selection of pre made diagrams, use <a target="_blank" href="premade.html">these</a> or for more complex use <a target="_blank" href="https://www.danbp.org/tulipcomposer/tulipcomposer.html">TulipComposer2</a>.<br>
<form id="frm1">
  Mode: <input type="text" name="mode" pattern="[RrMmJjTt]" value="R"><br>
  Exit: <input type="text" name="exit" value="9"><br>
  Other Exits: <input type="text" name="others" value="12 3"><br>
  <input type="reset" value="Reset">
</form> 

<button onclick="help()">Help</button>
<button onclick="tulip_gen()">Generate</button>
<button onclick="download_svg()">Download SVG</button>

<p id="output"></p>
<p id="help"></p>



</body>
</html>
