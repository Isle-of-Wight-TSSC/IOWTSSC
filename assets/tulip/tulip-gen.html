<body>
<h1>Tulip Diagram Generator</h1>
This tool generates a simple tulip diagram for a single junction.<br> For a selection of pre made diagrams, use <a target="_blank" href="premade.html">these</a> or for more complex use <a target="_blank" href="https://www.danbp.org/tulipcomposer/tulipcomposer.html">TulipComposer2</a>.<br>
<form id="frm1">
  Mode: <input type="text" name="mode" pattern="[RrMmJjTt]" value="R"><br>
  Exit: <input type="text" name="exit" value="9"><br>
  Others: <input type="text" name="others" value="12 3"><br>
  <input type="reset" value="Reset">
</form> 

<button onclick="help()">Help</button>
<button onclick="tulip_gen()">Generate</button>
<button onclick="download_svg()">Download SVG</button>

<p id="output"></p>
<p id="help"></p>



</body>
