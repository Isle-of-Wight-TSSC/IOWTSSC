<!DOCTYPE html><html lang="en"><head>
      <title>Roadmap Generator</title>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description" content="Website for the Isle of Wight Triumph Sport Six Club, tool to generate roadmaps for convoy routes.">
      <link rel="stylesheet" href="style.css">
      <link rel="canonical" href="https://iow.triumphsportsix.club/roadmap-gen" />
</head>
<style>
table, th, tr, td {
  border: 1px solid black;
  border-collapse: collapse;
}
tr, td {
  width:20%;
  height:20%;
  text-align: center; 
  vertical-align: middle;
}
</style>
<script src="roadmap.js">
</script>
<body
<form id="frm2">
  instruction ID to remove: <input type="integer" name="input" value="2"><br>
  <input type="reset" value="Reset">
</form> 
<form id="frm1">
  Interval: <input type="text" name="interval" value="0.4"><br>
  Symbol: <input type="text" name="symbol" value="M 9 12 3"><br>
  Description: <input type="text" name="description" value="turn left at the mini roundabout"><br>
  Instruction ID: <input type="integer" name="InstructionID" value="0"><br>
  <input type="reset" value="Reset">
</form> 
<button onclick="AddWaypoint()">add waypoint</button>
<button onclick="RemoveInstruction()">remove waypoint</button>
<button onclick="BuildRoadmap()">Build Roadmap</button>
<button onclick="ExportRoadmap()">Export Roadmap</button>

<p id="help"></p>
<p id="output"></p></body></html>
